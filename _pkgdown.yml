url: https://CoDe-Neuro.github.io/stateR

template:
  bootstrap: 5
  bslib:
    bg:              "#FFE0C5"
    fg:              "#004040"
    primary:         "#007979"
    secondary:       "#f5c9a0"
    success:         "#007979"
    info:            "#FFE0C5"
    warning:         "#007979"
    danger:          "#004040"

    base_font:       {google: "Afacad"}
    heading_font:    {google: "Livvic"}
    code_font:       {google: "JetBrains Mono"}

    font-size-base:  "1rem"
    headings-font-weight: 700

    card-bg:         "#FFF0E4"
    card-border-color: "#f5c9a0"
    card-border-radius: "0.75rem"

    pre-bg:          "#004040"
    pre-color:       "#FFE0C5"

  includes:
    in_header: |
      <style>
        .navbar {
          background-color: #004040 !important;
          border-bottom: 2px solid #007979;
        }
        .navbar .navbar-brand,
        .navbar-nav .nav-link,
        .navbar-nav .nav-link:hover,
        .navbar form .btn {
          color: #FFE0C5 !important;
        }
        .navbar-nav .nav-link:hover { opacity: 0.8; }
        .navbar-nav .nav-link.active {
          color: #FFE0C5 !important;
          border-bottom: 3px solid #FFE0C5;
          font-weight: 700;
        }
        .navbar small.nav-text { color: #f5c9a0 !important; }
        .navbar-brand img { height: 40px; width: auto; }
        .page-header { border-bottom: none !important; }
        .sidebar .nav-link,
        .sidebar a,
        #toc a,
        #toc .nav-link {
          color: #004040 !important;
        }
        .sidebar .nav-link:hover,
        .sidebar a:hover,
        #toc a:hover {
          color: #007979 !important;
        }
        .sidebar .nav-link.active,
        #toc .nav-link.active {
          color: #007979 !important;
          border-left: 2px solid #f5c9a0;
          font-weight: 600;
        }
        .text-muted { color: #007979 !important; }
        .sidebar { border-left: 3px solid #f5c9a0; padding-left: 1rem; }
        .reference-index h2 {
          color: #007979;
          font-size: 0.8rem;
          text-transform: uppercase;
          letter-spacing: 0.08em;
        }
        code {
          color: #007979;
          background: #FFF0E4;
          border-radius: 4px;
          padding: 0.1em 0.35em;
        }
        .footer { background: #004040; color: #f5c9a0; padding: 1.5rem 0; }
        .footer a { color: #FFE0C5; }
        #search-input { border-color: #007979; }
        .badge.bg-primary { background-color: #007979 !important; }
        a { color: #007979; }
        a:hover { color: #004040; }
      </style>

logo: man/figures/logo.svg

home:
  title: "stateR — Brain State Dynamics for R"
  description: >
    An R package for characterising brain state dynamics from functional
    connectivity time series — computing fractional occupancy, dwell time,
    and Markov-chain transition probabilities. Developed at King's College London.
  links:
  - text: CoDe-Neuro Lab
    href: https://github.com/CoDe-Neuro
  sidebar:
    structure: [links, license, citation, authors, dev]

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [search, github]
  components:
    intro:
      text: Get started
      href: articles/getting-started.html
    github:
      icon: fab fa-github
      href: https://github.com/CoDe-Neuro/stateR
      aria-label: GitHub

reference:
- title: "State metrics"
  desc: "Core functions for quantifying brain state dynamics."
  contents:
  - nest_fo
  - nest_dwell
  - clusters_markov

- title: "Internals"
  desc: "Helper functions used internally."
  contents:
  - dwellCount

articles:
- title: "Vignettes"
  navbar: ~
  contents:
  - getting-started
  - markov-transitions
  - grouped-pipeline

authors:
  Lucas França:
    href: https://orcid.org/0000-0003-0853-1319
  Dafnis Batallé:
    href: https://orcid.org/0000-0003-2097-979X

footer:
  structure:
    left: [package, developed_by]
    right: [built_with]
  components:
    package: >
      **stateR** — CoDe-Neuro Lab, King's College London.
    developed_by: >
      Lucas França & Dafnis Batallé.
